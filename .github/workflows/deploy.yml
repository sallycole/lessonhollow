name: Deploy to Fly.io

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Cleanup stale blue-green machines
        run: |
          for m in $(flyctl machines list -a lessonhollow --json | python3 -c "
          import sys, json
          for m in json.load(sys.stdin):
              if m.get('config', {}).get('metadata', {}).get('fly_bluegreen_deployment_tag') == 'safe_to_destroy':
                  print(m['id'])
          "); do
            echo "Destroying stale machine $m"
            flyctl machines destroy "$m" -a lessonhollow --force
          done
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deploy
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
