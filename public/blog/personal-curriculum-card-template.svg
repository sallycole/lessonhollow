<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="1080" height="1350" fill="#f8f4ee"/>
  <text x="540" y="120" text-anchor="middle" font-family="Arial, sans-serif" font-size="50" font-weight="700" fill="#3b322c">Light personal curriculum card</text>
  <rect x="180" y="210" width="720" height="930" rx="34" fill="#fffaf4" stroke="#d9cbb8" stroke-width="4"/>
  <g font-family="Arial, sans-serif">
    <text x="240" y="320" font-size="34" font-weight="700" fill="#6c553a">Path</text>
