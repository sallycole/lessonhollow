<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">A cleaner reset map</title><desc id="desc">Four-step reset map for stale curriculum: use helpful parts, switch format, pause, or make the path visible.</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#ffedd5"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#334155" flood-opacity="0.14"/></filter></defs>
<rect width="1200" height="675" fill="url(#bg)"/><text x="70" y="74" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="42" font-weight="850" fill="#0f172a" text-anchor="start">
<tspan x="70" dy="0">A cleaner reset map</tspan>
</text><text x="72" y="128" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="520" fill="#475569" text-anchor="start">
<tspan x="72" dy="0">The fix depends on what is actually stale, not on how much curriculum is left.</tspan>
</text><rect x="70" y="228" width="240" height="215" rx="30" fill="#fed7aa" filter="url(#shadow)"/><circle cx="112" cy="272" r="22" fill="#ffffff" opacity="0.82"/><text x="112" y="281" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="850" fill="#9a3412" text-anchor="middle">
<tspan x="112" dy="0">1</tspan>
</text><text x="98" y="323" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#9a3412" text-anchor="start">
<tspan x="98" dy="0">Too much to run</tspan>
</text><text x="98" y="386" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="98" dy="0">Use only the helpful</tspan>
<tspan x="98" dy="25.0">parts</tspan>
</text><path d="M318 334 L340 334" stroke="#64748b" stroke-width="6" stroke-linecap="round"/><path d="M332 324 L344 334 L332 344" stroke="#64748b" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="350" y="228" width="240" height="215" rx="30" fill="#bfdbfe" filter="url(#shadow)"/><circle cx="392" cy="272" r="22" fill="#ffffff" opacity="0.82"/><text x="392" y="281" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="850" fill="#1d4ed8" text-anchor="middle">
<tspan x="392" dy="0">2</tspan>
</text><text x="378" y="323" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#1d4ed8" text-anchor="start">
<tspan x="378" dy="0">Wrong format</tspan>
</text><text x="378" y="386" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="378" dy="0">Switch curriculum or</tspan>
<tspan x="378" dy="25.0">medium</tspan>
</text><path d="M598 334 L620 334" stroke="#64748b" stroke-width="6" stroke-linecap="round"/><path d="M612 324 L624 334 L612 344" stroke="#64748b" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="630" y="228" width="240" height="215" rx="30" fill="#bbf7d0" filter="url(#shadow)"/><circle cx="672" cy="272" r="22" fill="#ffffff" opacity="0.82"/><text x="672" y="281" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="850" fill="#15803d" text-anchor="middle">
<tspan x="672" dy="0">3</tspan>
</text><text x="658" y="323" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#15803d" text-anchor="start">
<tspan x="658" dy="0">Wrong season</tspan>
</text><text x="658" y="386" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="658" dy="0">Pause and name when to</tspan>
<tspan x="658" dy="25.0">revisit</tspan>
</text><path d="M878 334 L900 334" stroke="#64748b" stroke-width="6" stroke-linecap="round"/><path d="M892 324 L904 334 L892 344" stroke="#64748b" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/><rect x="910" y="228" width="240" height="215" rx="30" fill="#e9d5ff" filter="url(#shadow)"/><circle cx="952" cy="272" r="22" fill="#ffffff" opacity="0.82"/><text x="952" y="281" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="23" font-weight="850" fill="#7e22ce" text-anchor="middle">
<tspan x="952" dy="0">4</tspan>
</text><text x="938" y="323" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="800" fill="#7e22ce" text-anchor="start">
<tspan x="938" dy="0">Path lives in your</tspan>
<tspan x="938" dy="30.0">head</tspan>
</text><text x="938" y="386" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="20" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="938" dy="0">Make the next lessons</tspan>
<tspan x="938" dy="25.0">visible</tspan>
</text><rect x="250" y="505" width="700" height="70" rx="26" fill="#0f172a" opacity="0.92" filter="url(#shadow)"/><text x="600" y="550" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="27" font-weight="800" fill="#f8fafc" text-anchor="middle">
<tspan x="600" dy="0">Payoff: a week your family can actually start.</tspan>
</text></svg>