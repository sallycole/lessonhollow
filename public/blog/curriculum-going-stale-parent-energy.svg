<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
<title id="title">The hidden cost is parent energy</title>
<desc id="desc">Two-column infographic comparing curriculum that spends parent energy with curriculum that gives energy back.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fefce8"/><stop offset="1" stop-color="#e0f2fe"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#334155" flood-opacity="0.14"/></filter>
</defs>
<rect width="1200" height="675" fill="url(#bg)"/>
<text x="70" y="75" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="850" fill="#0f172a" text-anchor="start">
<tspan x="70" dy="0">The hidden cost is parent energy</tspan>
</text><text x="72" y="128" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="520" fill="#475569" text-anchor="start">
<tspan x="72" dy="0">A curriculum can be rich and still cost too much to run every week.</tspan>
</text><rect x="90" y="190" width="420" height="365" rx="32" fill="#ffffff" filter="url(#shadow)"/><rect x="650" y="190" width="420" height="365" rx="32" fill="#ffffff" filter="url(#shadow)"/><text x="125" y="245" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="800" fill="#b45309" text-anchor="start">
<tspan x="125" dy="0">Spends energy</tspan>
</text><circle cx="138" cy="287" r="12" fill="#fed7aa"/><path d="M132 287 l5 6 l10 -14" stroke="#b45309" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="165" y="295" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="165" dy="0">read ahead</tspan>
</text><circle cx="138" cy="332" r="12" fill="#fed7aa"/><path d="M132 332 l5 6 l10 -14" stroke="#b45309" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="165" y="340" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="165" dy="0">choose among options</tspan>
</text><circle cx="138" cy="377" r="12" fill="#fed7aa"/><path d="M132 377 l5 6 l10 -14" stroke="#b45309" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="165" y="385" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="165" dy="0">prepare materials</tspan>
</text><circle cx="138" cy="422" r="12" fill="#fed7aa"/><path d="M132 422 l5 6 l10 -14" stroke="#b45309" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="165" y="430" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="165" dy="0">translate the guide</tspan>
</text><circle cx="138" cy="467" r="12" fill="#fed7aa"/><path d="M132 467 l5 6 l10 -14" stroke="#b45309" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="165" y="475" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="165" dy="0">revive skipped pieces</tspan>
</text><text x="685" y="245" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="800" fill="#047857" text-anchor="start">
<tspan x="685" dy="0">Gives energy back</tspan>
</text><circle cx="698" cy="287" r="12" fill="#dcfce7"/><path d="M692 287 l5 6 l10 -14" stroke="#047857" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="725" y="295" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="725" dy="0">clear next lessons</tspan>
</text><circle cx="698" cy="332" r="12" fill="#dcfce7"/><path d="M692 332 l5 6 l10 -14" stroke="#047857" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="725" y="340" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="725" dy="0">student-facing notes</tspan>
</text><circle cx="698" cy="377" r="12" fill="#dcfce7"/><path d="M692 377 l5 6 l10 -14" stroke="#047857" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="725" y="385" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="725" dy="0">easy re-entry</tspan>
</text><circle cx="698" cy="422" r="12" fill="#dcfce7"/><path d="M692 422 l5 6 l10 -14" stroke="#047857" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="725" y="430" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="725" dy="0">room for books and projects</tspan>
</text><circle cx="698" cy="467" r="12" fill="#dcfce7"/><path d="M692 467 l5 6 l10 -14" stroke="#047857" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/><text x="725" y="475" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" font-weight="560" fill="#334155" text-anchor="start">
<tspan x="725" dy="0">less guilt in the day</tspan>
</text><path d="M535 368 C570 338 595 338 630 368" stroke="#64748b" stroke-width="9" fill="none" stroke-linecap="round"/><path d="M619 352 L638 368 L619 384" stroke="#64748b" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>